<style>

  .dot.r{background:#0a0;}.dot.y{background:#0c0;}.dot.g{background:#0f0;box-shadow:0 0 6px #0f0;}
  .titlebar .name{margin-left:8px;color:var(--green-dim);font-size:12px;flex:1;text-align:center;letter-spacing:.5px;}

  /* fade-in sections */
  .reveal{opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s;}
  .reveal.in{opacity:1;transform:none;}
  @media (prefers-reduced-motion: reduce){.reveal{opacity:1;transform:none;}#boot{display:none;}}
  /* interactive terminal */

  .term-in{display:flex;align-items:center;gap:8px;}

  .term::-webkit-scrollbar{width:8px;}

</style>

/* ---------- MATRIX RAIN ---------- */
(function(){
  const c=document.getElementById("matrix"),x=c.getContext("2d");
  let cols,drops,fs=18;
  const chars="0123456789".split("");
  function size(){c.width=innerWidth;c.height=innerHeight;cols=Math.floor(c.width/fs);drops=Array(cols).fill(1);}
  size();addEventListener("resize",size);
  function draw(){
    x.fillStyle="rgba(0,0,0,0.10)";x.fillRect(0,0,c.width,c.height);
    x.font=fs+"px monospace";
    for(let i=0;i<drops.length;i++){
      const ch=chars[Math.floor(Math.random()*chars.length)];
      const y=drops[i]*fs;
      // leading char brighter, trail dim
      x.fillStyle=Math.random()>0.985?"#7dffa0":"#0a8f2e";
      x.fillText(ch,i*fs,y);
      if(y>c.height&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    }
  }
  if(!matchMedia("(prefers-reduced-motion: reduce)").matches) setInterval(draw,85);
})();

    <input id="termin" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="terminal input">
  </div>
</div>`;

document.getElementById("app").innerHTML=html;

/* ---------- INTERACTIVE SHELL ---------- */
(function(){
  const out=document.getElementById("termout");
  const inp=document.getElementById("termin");
  const term=document.getElementById("term");
  if(!out||!inp) return;
  const history=[]; let hi=-1;

  function print(lines){
    (Array.isArray(lines)?lines:[lines]).forEach(l=>{
      const d=document.createElement("div"); d.className="l";
      d.innerHTML=l; out.appendChild(d);
    });
    term.scrollTop=term.scrollHeight;
  }
  function echo(cmd){
    print(`<span class="ok">marwan@network ~ $</span> ${e(cmd)}`);
  }

  const COMMANDS={
    help(){return [
      '<span class="acc">available commands:</span>',
      '  <span class="ok">whoami</span>       who is this guy',
      '  <span class="ok">skills</span>       technical stack',
      '  <span class="ok">experience</span>   work history',
      '  <span class="ok">projects</span>     things I have built',
      '  <span class="ok">certs</span>        certifications',
      '  <span class="ok">neofetch</span>     system summary card',
      '  <span class="ok">contact</span>      how to reach me',
      '  <span class="ok">cv</span>           download my CV (PDF)',
      '  <span class="ok">clear</span>        clear the screen',
      '  <span class="muted">// psst... there might be a hidden command</span>'
    ];},
    whoami(){return [
      `<span class="acc">${e(DATA.profile.name)}</span> — ${e(DATA.profile.role)}`,
      `${e(DATA.profile.location)} · status: <span class="ok">${e(DATA.profile.status)}</span>`,
      e(DATA.summary)
    ];},
    skills(){
      const r=['<span class="acc">technical stack:</span>'];
      for(const [cat,arr] of Object.entries(DATA.skills)) r.push(`  <span class="ok">${e(cat)}</span>: ${arr.map(e).join(", ")}`);
      return r;
    },
    experience(){
      const r=['<span class="acc">work history:</span>'];
      DATA.experience.forEach(j=>{r.push(`  <span class="ok">${e(j.title)}</span> @ ${e(j.company)} <span class="muted">(${e(j.date)})</span>`);});
      r.push('<span class="muted">// run "cv" for full details</span>');
      return r;
    },
    certs(){
      return ['<span class="acc">certifications:</span>'].concat(
        DATA.certifications.map(c=>`  <span class="ok">-</span> ${e(c.title)}`)
      );
    },
    projects(){
      const r=['<span class="acc">projects:</span>'];
      DATA.projects.forEach(p=>{r.push(`  <span class="ok">${e(p.name)}</span> <span class="muted">[${e(p.tech)}]</span>`);r.push(`    ${e(p.desc)}`);});
      return r;
    },
    neofetch(){
      const exp=DATA.experience.length, cert=DATA.certifications.length, proj=DATA.projects.length;
      const logo=[
        '<span class="ok">      _nnnn_      </span>',
        '<span class="ok">     dGGGGMMb     </span>',
        '<span class="ok">    @p~qp~~qMb    </span>',
        '<span class="ok">    M|@||@) M|    </span>',
        '<span class="ok">    @,----.JM|    </span>',
        '<span class="ok">   JS^\\__/  qKL   </span>',
        '<span class="ok">  dZP        qKRb </span>',
        '<span class="ok"> dZP          qKKb</span>'
      ];
      const info=[
        `<span class="acc">marwan</span>@<span class="acc">network</span>`,
        `-----------------`,
        `<span class="ok">Role</span>: ${e(DATA.profile.role)}`,
        `<span class="ok">Location</span>: ${e(DATA.profile.location)}`,
        `<span class="ok">Focus</span>: Networking \u00b7 Security \u00b7 Cloud`,
        `<span class="ok">Experience</span>: 5+ years`,
        `<span class="ok">Roles</span>: ${exp} \u00b7 <span class="ok">Certs</span>: ${cert} \u00b7 <span class="ok">Projects</span>: ${proj}`,
        `<span class="ok">Stack</span>: FortiGate, Palo Alto, Cisco, OCI`,
        `<span class="ok">Status</span>: available for opportunities`
      ];
      const rows=[];
      for(let i=0;i<Math.max(logo.length,info.length);i++){
        rows.push(`${logo[i]||'                  '}   ${info[i]||''}`);
      }
      return rows;
    },
    contact(){return [
      '<span class="acc">contact:</span>',
      `  email    <a href="mailto:${e(DATA.contact.email)}">${e(DATA.contact.email)}</a>`,
      `  phone    ${e(DATA.contact.phone)}`,
      `  linkedin <a href="https://${e(DATA.contact.linkedin)}" target="_blank">${e(DATA.contact.linkedin)}</a>`,
      `  github   <a href="https://${e(DATA.contact.github)}" target="_blank">${e(DATA.contact.github)}</a>`
    ];},
    cv(){window.open("cv.pdf","_blank");return '<span class="ok">opening cv.pdf ...</span>';},
    clear(){out.innerHTML="";return null;},
    ls(){return 'whoami  skills  experience  certs  contact  cv';},
    pwd(){return '/home/marwan/portfolio';},
    date(){return new Date().toString();},
    echo(a){return e(a.join(" "));},
    "sudo"(a){
      if(a.join(" ").toLowerCase()==="hire-me"){
        return [
          '<span class="warn">[sudo] authenticating candidate...</span>',
          '<span class="ok">[OK]</span> 5+ years enterprise networking ........ verified',
          '<span class="ok">[OK]</span> FortiGate / Palo Alto / Cisco ......... verified',
          '<span class="ok">[OK]</span> security mindset ...................... verified',
          '<span class="acc">>> access granted. excellent decision. let\u2019s talk:</span>',
          `   <a href="mailto:${e(DATA.contact.email)}">${e(DATA.contact.email)}</a>`
        ];
      }
      return '<span class="err">sudo: permission denied (try: sudo hire-me)</span>';
    }
  };

  function run(raw){
    const parts=raw.trim().split(/\s+/);
    const cmd=(parts.shift()||"").toLowerCase();
    if(!cmd) return;
    if(COMMANDS[cmd]){
      const res=COMMANDS[cmd](parts);
      if(res!==null && res!==undefined) print(res);
    } else {
      print(`<span class="err">command not found: ${e(cmd)}</span> <span class="muted">— type "help"</span>`);
    }
  }

  // greeting
  print(['<span class="muted">last login: just now on ttys001</span>','Type <span class="ok">help</span> to begin.','']);

  inp.addEventListener("keydown",ev=>{
    if(ev.key==="Enter"){
      const v=inp.value;
      echo(v);
      if(v.trim()){history.push(v);hi=history.length;}
      run(v);
      inp.value="";
      print('');
    } else if(ev.key==="ArrowUp"){
      if(hi>0){hi--;inp.value=history[hi]||"";} ev.preventDefault();
    } else if(ev.key==="ArrowDown"){
      if(hi<history.length-1){hi++;inp.value=history[hi]||"";}
      else{hi=history.length;inp.value="";} ev.preventDefault();
    }
  });
  term.addEventListener("click",()=>inp.focus());
})();

(function(){
  const boot=document.getElementById("boot");
  if(!boot||matchMedia("(prefers-reduced-motion: reduce)").matches){ if(boot)boot.classList.add("done"); return; }
  const lines=[
    "marwan@network — boot sequence",
    "",
    "[<span style='color:#7dffa0'>  OK  </span>] Initializing network interfaces ...",
    "[<span style='color:#7dffa0'>  OK  </span>] Loading firewall policies (FortiGate / Palo Alto) ...",
    "[<span style='color:#7dffa0'>  OK  </span>] Establishing IPSec tunnels ...",
    "[<span style='color:#7dffa0'>  OK  </span>] Mounting /home/marwan/portfolio ...",
    "[<span style='color:#7dffa0'>  OK  </span>] Starting profile service ...",
    "",
    "<span style='color:#7dffa0'>ready.</span> launching ..."
  ];
  let i=0;
  function next(){
    if(i<lines.length){
      const d=document.createElement("div");
      d.className="bl"; d.innerHTML=lines[i]||"&nbsp;";
      boot.appendChild(d); i++;
      setTimeout(next, lines[i-1]===""?80:160);
    } else {
      setTimeout(()=>boot.classList.add("done"),450);
      setTimeout(()=>boot.remove(),1000);
    }
  }
  next();
})();

/* ---------- LIVE CLOCK ---------- */
(function(){
  const el=document.getElementById("clock"); if(!el)return;
  function tick(){
    const d=new Date();
    el.textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  tick(); setInterval(tick,1000);
})();

/* ---------- CLICK TO COPY EMAIL ---------- */
(function(){
  const toast=document.getElementById("toast");
  document.addEventListener("click",ev=>{
    const t=ev.target.closest(".copyable");
    if(!t)return;
    ev.preventDefault();
    const val=t.getAttribute("data-copy");
    const done=()=>{ if(toast){toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1400);} };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(val).then(done).catch(done);
    } else {
      const ta=document.createElement("textarea");ta.value=val;document.body.appendChild(ta);
      ta.select();try{document.execCommand("copy");}catch(e){}ta.remove();done();
    }
  });
})();

/* ---------- FADE-IN REVEAL ---------- */
(function(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  const blocks=document.querySelectorAll("#app .out, #app .summary, #app .contactbar");
  blocks.forEach(b=>b.classList.add("reveal"));
  const io=new IntersectionObserver((ents)=>{
    ents.forEach(en=>{ if(en.isIntersecting){en.target.classList.add("in");io.unobserve(en.target);} });
  },{threshold:.08});
  blocks.forEach(b=>io.observe(b));
})();
